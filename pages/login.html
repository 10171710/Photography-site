<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Aura Photography</title>

  <link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

  <link href="../assets/css/style.css" rel="stylesheet">
  <link href="../assets/css/dark-mode.css" rel="stylesheet">
  <link href="../assets/css/rtl.css" rel="stylesheet">
</head>

<body class="auth-page">

<div class="auth-standalone-brand">
  <a href="index.html" aria-label="Aura Photography home">
    <img src="../assets/images/aura-logo-nav.svg" alt="" class="navbar-logo navbar-logo-light" width="160" height="44" decoding="async" aria-hidden="true">
    <img src="../assets/images/aura-logo-nav-dark.svg" alt="Aura Photography" class="navbar-logo navbar-logo-dark" width="160" height="44" decoding="async">
  </a>
</div>

<main class="container auth-shell auth-shell-standalone">

  <section class="auth-copy">
    <span class="subtitle">Welcome back</span>
    <h1>Sign in to continue your photography journey</h1>
    <p>Access your bookings, updates, and client experience with a secure personalized account.</p>
  </section>

  <section class="auth-card">
    <h2>Sign In</h2>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label" for="loginEmail">Email address</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required>
      </div>

      <div class="mb-3">
        <label class="form-label" for="loginPassword">Password</label>
        <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required>
      </div>

      <button class="btn-aura btn-aura-fill w-100" type="submit">Sign In</button>

      <div class="auth-links auth-links-center">
        <a href="register.html">Create account</a>
      </div>

      <div class="auth-divider">or continue with</div>

      <div class="auth-social">
        <button type="button" class="btn-social" data-social-login="google">
          <i class="fab fa-google" aria-hidden="true"></i> Google
        </button>
        <button type="button" class="btn-social" data-social-login="apple">
          <i class="fab fa-apple" aria-hidden="true"></i> Apple
        </button>
      </div>
    </form>

    <div id="loginMessage" class="auth-message"></div>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/main.js"></script>

</body>
</html>
