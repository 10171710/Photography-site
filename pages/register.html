<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Aura Photography</title>
  <link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
  <link href="../assets/css/dark-mode.css" rel="stylesheet">
  <link href="../assets/css/rtl.css" rel="stylesheet">
</head>
<body class="auth-page">

  <div class="auth-standalone-brand">
    <a href="index.html" aria-label="Aura Photography home">
      <img src="../assets/images/aura-logo-nav.svg" alt="" class="navbar-logo navbar-logo-light" width="160" height="44" decoding="async" aria-hidden="true">
      <img src="../assets/images/aura-logo-nav-dark.svg" alt="Aura Photography" class="navbar-logo navbar-logo-dark" width="160" height="44" decoding="async">
    </a>
  </div>

  <main class="container auth-shell auth-shell-standalone">
    <section class="auth-copy">
      <span class="subtitle">Join Aura</span>
      <h1>Create an account to book your next session</h1>
      <p>Register as a client to enjoy a smooth, personalized booking experience.</p>
    </section>

    <section class="auth-card" aria-labelledby="register-title">
      <h2 id="register-title">Register</h2>
      <p class="text-muted">Create your account to begin.</p>
      <form id="registerForm" novalidate>
        <div class="mb-3">
          <label for="registerName" class="form-label">Full name</label>
          <input type="text" class="form-control" id="registerName" placeholder="Your full name" required>
        </div>
        <div class="mb-3">
          <label for="registerEmail" class="form-label">Email address</label>
          <input type="email" class="form-control" id="registerEmail" placeholder="you@example.com" required>
        </div>
        <div class="mb-3">
          <label for="registerPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="registerPassword" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn-aura btn-aura-fill w-100">Create Account</button>

        <div class="auth-links auth-links-center">
          <a href="login.html">Already have an account? Sign in</a>
        </div>

        <div class="auth-divider">or continue with</div>

        <div class="auth-social">
          <button type="button" class="btn-social" data-social-login="google">
            <i class="fab fa-google" aria-hidden="true"></i> Google
          </button>
          <button type="button" class="btn-social" data-social-login="apple">
            <i class="fab fa-apple" aria-hidden="true"></i> Apple
          </button>
        </div>
      </form>
      <div class="auth-message" id="registerMessage"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
