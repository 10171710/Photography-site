<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aura Photography — New portfolio launching soon. Sign up for updates and be the first to see our latest work.">
  <title>Coming Soon | Aura Photography</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml">
  <link href="../assets/css/style.css" rel="stylesheet">
  <link href="../assets/css/dark-mode.css" rel="stylesheet">
  <link href="../assets/css/rtl.css" rel="stylesheet">
</head>
<body>

  <main id="main-content" class="coming-soon-page">
    <div class="container">
      <div class="text-center">
        <a href="index.html" class="navbar-brand d-block mb-4" aria-label="Aura Photography home">
          <img src="../assets/images/aura-logo-nav.svg" alt="" class="navbar-logo navbar-logo-light" width="148" height="40" decoding="async" aria-hidden="true">
          <img src="../assets/images/aura-logo-nav-dark.svg" alt="Aura Photography" class="navbar-logo navbar-logo-dark" width="148" height="40" decoding="async">
        </a>
        <span class="subtitle">Stay Tuned</span>
        <h1>New Portfolio Launching Soon</h1>
        <p class="lead text-muted mb-4">We're curating our finest work for an all-new portfolio experience. Be the first to see it.</p>

        <!-- Countdown Timer -->
        <div id="countdown" class="countdown" aria-live="polite" aria-label="Countdown to portfolio launch"></div>

        <!-- Mailchimp-ready email signup -->
        <form id="newsletterForm" class="newsletter-form mt-4" action="https://YOUR-DOMAIN.us1.list-manage.com/subscribe/post?u=YOUR_USER_ID&amp;id=YOUR_LIST_ID" method="post" target="_blank" novalidate>
          <p class="mb-3">Get notified when we launch:</p>
          <div class="input-group">
            <label for="launch-email" class="visually-hidden">Email address</label>
            <input type="email" class="form-control" id="launch-email" name="EMAIL" placeholder="Your email address" required aria-required="true">
            <button type="submit" class="btn-aura btn-aura-fill">Notify Me</button>
          </div>
        </form>

        <div class="mt-4 d-flex justify-content-center gap-2">
          <button class="nav-icon-btn" id="themeToggle" aria-label="Switch to dark mode" type="button"><i class="fas fa-moon" aria-hidden="true"></i></button>
          <button class="nav-icon-btn" id="rtlToggle" aria-label="Switch to RTL layout" type="button"><i class="fas fa-right-left" aria-hidden="true"></i></button>
        </div>

        <p class="mt-4"><a href="index.html">← Back to Homepage</a></p>
      </div>
    </div>
  </main>

  <footer class="footer-aura" aria-label="Site footer"><div class="container"><div class="footer-bottom"><p>&copy; 2026 Aura Photography. All rights reserved.</p></div></div></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
