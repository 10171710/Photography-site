<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings | Aura Photography Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link href="assets/css/admin.css" rel="stylesheet" />
</head>
<body class="admin-body">
  <div class="admin-shell">
    <aside class="admin-sidebar" id="adminSidebarRoot"></aside>
    <main class="admin-main">
      <div class="admin-topbar" id="adminTopbarRoot"></div>
      <div class="admin-content">
        <div class="admin-panel-grid">
          <section class="settings-card">
            <div class="section-title-row mb-3">
              <h5 class="mb-0">Studio details</h5>
              <span class="badge-soft">Live updates</span>
            </div>
            <form id="settingsForm">
              <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Website Name</label><input class="form-control" data-setting="siteName" /></div>
                <div class="col-md-6"><label class="form-label">Contact Email</label><input class="form-control" data-setting="contactEmail" /></div>
                <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" data-setting="phone" /></div>
                <div class="col-md-6"><label class="form-label">Address</label><input class="form-control" data-setting="address" /></div>
                <div class="col-md-6"><label class="form-label">Instagram</label><input class="form-control" data-setting="instagram" /></div>
                <div class="col-md-6"><label class="form-label">Facebook</label><input class="form-control" data-setting="facebook" /></div>
                <div class="col-12"><label class="form-label">Theme</label><select class="form-select" data-setting="theme"><option value="light">Light</option><option value="dark">Dark</option></select></div>
                <div class="col-12"><button class="btn-aura" type="submit"><i class="fa-solid fa-floppy-disk"></i> Save Settings</button></div>
              </div>
            </form>
          </section>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
