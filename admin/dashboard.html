<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Aura Photography Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link href="assets/css/admin.css" rel="stylesheet" />
</head>
<body class="admin-body">
  <div class="admin-shell">
    <aside class="admin-sidebar" id="adminSidebarRoot"></aside>
    <main class="admin-main">
      <div class="admin-topbar" id="adminTopbarRoot"></div>
      <div class="admin-content">
        <section class="stat-grid">
          <div class="stat-card"><span class="stat-label">Total Bookings</span><div class="stat-value" id="statBookings">0</div></div>
          <div class="stat-card"><span class="stat-label">Total Customers</span><div class="stat-value" id="statCustomers">0</div></div>
          <div class="stat-card"><span class="stat-label">Portfolio Items</span><div class="stat-value" id="statPortfolio">0</div></div>
          <div class="stat-card"><span class="stat-label">Services</span><div class="stat-value" id="statServices">0</div></div>
          <div class="stat-card"><span class="stat-label">Blog Posts</span><div class="stat-value" id="statBlog">0</div></div>
          <div class="stat-card"><span class="stat-label">Contact Messages</span><div class="stat-value" id="statMessages">0</div></div>
          <div class="stat-card"><span class="stat-label">Revenue</span><div class="stat-value" id="statRevenue">$0</div></div>
        </section>
        <div class="row g-3">
          <div class="col-lg-8">
            <div class="admin-card chart-card">
              <h4 class="mb-3">Monthly Booking Chart</h4>
              <canvas id="bookingChart" height="260"></canvas>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="admin-card">
              <h4 class="mb-3">Quick Actions</h4>
              <div class="d-grid gap-2">
                <a class="btn-outline-aura justify-content-start" href="bookings.html"><i class="fa-solid fa-calendar-check"></i> Manage Bookings</a>
                <a class="btn-outline-aura justify-content-start" href="portfolio.html"><i class="fa-solid fa-image"></i> Add Portfolio Item</a>
                <a class="btn-outline-aura justify-content-start" href="blog.html"><i class="fa-solid fa-newspaper"></i> Publish Blog Post</a>
                <a class="btn-outline-aura justify-content-start" href="messages.html"><i class="fa-solid fa-envelope"></i> Review Messages</a>
              </div>
            </div>
          </div>
        </div>
        <div class="row g-3">
          <div class="col-lg-7">
            <div class="admin-card">
              <h4 class="mb-3">Recent Bookings</h4>
              <div class="table-responsive">
                <table class="table align-middle">
                  <thead>
                    <tr><th>Client</th><th>Service</th><th>Date</th><th>Status</th></tr>
                  </thead>
                  <tbody id="recentBookingsList"></tbody>
                </table>
              </div>
            </div>
          </div>
          <div class="col-lg-5">
            <div class="admin-card">
              <h4 class="mb-3">Latest Contact Messages</h4>
              <div class="list-stack" id="latestMessages"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
