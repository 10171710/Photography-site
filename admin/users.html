<!DOCTYPE html>

  <title>Users | Aura Photography Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link href="assets/css/admin.css?v=2" rel="stylesheet">
</head>
<body class="admin-body">
  <div class="admin-shell">
    <aside class="admin-sidebar" id="adminSidebarRoot"></aside>
    <main class="admin-main">
      <div class="admin-topbar" id="adminTopbarRoot"></div>
      <div class="admin-content">
        <!-- <section class="page-header">
          <div class="section-title-row">
            <div><h3 class="mb-1">Users</h3><p>Manage administrators, permissions, and access roles with confidence.</p></div>
            <div class="d-flex gap-2 flex-wrap">
              <button class="btn-outline-aura"><i class="fa-solid fa-shield-halved"></i> Permissions</button>
              <button class="btn-aura"><i class="fa-solid fa-plus"></i> Add Admin</button>
            </div>
          </div>
        </section> -->
        <div class="container-fluid px-0">
    <div class="row g-4">

        <!-- Summary Card -->
        <div class="col-12">
            <section class="message-summary-card">
                <div class="row g-3">

                    <div class="col-12 col-md-4">
                        <div class="info-title">Active Admins</div>
                        <div class="info-value">2</div>
                    </div>

                    <div class="col-12 col-md-4">
                        <div class="info-title">Roles</div>
                        <div class="info-value">Super Admin, Editor</div>
                    </div>

                    <div class="col-12 col-md-4">
                        <div class="info-title">Access</div>
                        <div class="info-value">Secure &amp; Controlled</div>
                    </div>

                </div>
            </section>
        </div>

        <!-- Users Table -->
        <div class="col-12">
            <section class="admin-card">

                <div class="table-responsive">

                    <table class="table table-hover align-middle mb-0 users-table">

                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>

                        <tbody id="usersTableBody"></tbody>

                    </table>

                </div>

            </section>
        </div>

    </div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
