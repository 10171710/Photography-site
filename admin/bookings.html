<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookings | Aura Photography Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link href="assets/css/admin.css" rel="stylesheet" />
</head>
<body class="admin-body">
  <div class="admin-shell">
    <aside class="admin-sidebar" id="adminSidebarRoot"></aside>
    <main class="admin-main">
      <div class="admin-topbar" id="adminTopbarRoot"></div>
        </section>
        <section class="admin-card">
          <div class="table-responsive">
            <table class="table align-middle">
              <thead><tr><th>Client</th><th>Email</th><th>Service</th><th>Date</th><th>Status</th><th>Amount</th><th>Actions</th></tr></thead>
              <tbody id="bookingsTableBody"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>
  <div class="modal fade" id="bookingModal" tabindex="-1" aria-labelledby="bookingModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <form id="bookingModalForm">
          <div class="modal-header">
            <h5 class="modal-title" id="bookingModalLabel">Add Booking</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="bookingId" />
            <div class="row g-3">
              <div class="col-md-6">
                <label for="bookingCustomer" class="form-label">Client Name</label>
                <input type="text" class="form-control" id="bookingCustomer" required>
              </div>
              <div class="col-md-6">
                <label for="bookingEmail" class="form-label">Email</label>
                <input type="email" class="form-control" id="bookingEmail" required>
              </div>
              <div class="col-md-6">
                <label for="bookingService" class="form-label">Service</label>
                <input type="text" class="form-control" id="bookingService" required>
              </div>
              <div class="col-md-6">
                <label for="bookingDate" class="form-label">Date</label>
                <input type="date" class="form-control" id="bookingDate" required>
              </div>
              <div class="col-md-6">
                <label for="bookingStatus" class="form-label">Status</label>
                <select class="form-select" id="bookingStatus">
                  <option value="Pending">Pending</option>
                  <option value="Confirmed">Confirmed</option>
                  <option value="Completed">Completed</option>
                  <option value="Cancelled">Cancelled</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="bookingAmount" class="form-label">Amount</label>
                <input type="number" class="form-control" id="bookingAmount" min="0" step="1" required>
              </div>
              <div class="col-12">
                <label for="bookingNote" class="form-label">Note</label>
                <textarea class="form-control" id="bookingNote" rows="3"></textarea>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-aura">Save Booking</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <div class="modal fade" id="viewBookingModal" tabindex="-1" aria-labelledby="viewBookingModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="viewBookingModalLabel">Booking Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <dl class="row mb-0">
            <dt class="col-5">Client</dt><dd class="col-7" id="viewBookingCustomer"></dd>
            <dt class="col-5">Email</dt><dd class="col-7" id="viewBookingEmail"></dd>
            <dt class="col-5">Service</dt><dd class="col-7" id="viewBookingService"></dd>
            <dt class="col-5">Date</dt><dd class="col-7" id="viewBookingDate"></dd>
            <dt class="col-5">Status</dt><dd class="col-7" id="viewBookingStatus"></dd>
            <dt class="col-5">Amount</dt><dd class="col-7" id="viewBookingAmount"></dd>
            <dt class="col-5">Note</dt><dd class="col-7" id="viewBookingNote"></dd>
          </dl>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-aura" id="viewBookingEditBtn">Edit</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
