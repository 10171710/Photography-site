<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Aura Photography Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link href="assets/css/admin.css" rel="stylesheet" />
</head>
<body class="admin-body">
  <div class="admin-shell">
    <aside class="admin-sidebar" id="adminSidebarRoot"></aside>
    <main class="admin-main">
      <div class="admin-topbar" id="adminTopbarRoot"></div>
      <div class="admin-content">
        <div class="admin-panel-grid">
          <section class="profile-card">
            <div class="row g-4 align-items-center">
              <div class="col-md-3 text-center"><img class="avatar-preview" id="profilePreviewImage" src="../assets/images/elena-vasquez.jpg" alt="Profile preview" /></div>
              <div class="col-md-9">
                <div class="section-title-row mb-2">
                  <h5 class="mb-0">Account overview</h5>
                  <span class="badge-soft">Administrator</span>
                </div>
                <p class="text-muted mb-0">Keep your profile current so the admin experience stays personal and accessible.</p>
              </div>
            </div>
          </section>
          <section class="admin-card">
            <form id="profileForm">
              <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Full Name</label><input class="form-control" id="profileName" /></div>
                <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" id="profileEmail" /></div>
                <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" id="profilePhone" /></div>
                <div class="col-md-6"><label class="form-label">Avatar URL</label><input class="form-control" id="profileAvatar" /></div>
                <div class="col-12"><label class="form-label">Bio</label><textarea class="form-control" id="profileBio" rows="4"></textarea></div>
                <div class="col-12"><button class="btn-aura" type="submit"><i class="fa-solid fa-floppy-disk"></i> Save Profile</button></div>
              </div>
            </form>
          </section>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
